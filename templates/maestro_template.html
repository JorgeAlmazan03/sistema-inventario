<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Maestro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 15px;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .logout-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #e74c3c;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 22px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #2c3e50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #34495e;
        }

        .mensaje {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .error { color: #c0392b; }
        .ok { color: #27ae60; }

        /* 📱 MOBILE ADJUSTMENTS */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            h1 {
                font-size: 20px;
            }

            input {
                font-size: 14px;
                padding: 9px;
            }

            button {
                font-size: 15px;
                padding: 11px;
            }

            .logout-btn {
                padding: 8px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="topbar">
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">
    <h1>Crear Nuevo Negocio</h1>

    <label>Nombre del negocio</label>
    <input type="text" id="nombre" placeholder="Ej: Tacos El Güero">

    <label>ID del negocio (único)</label>
    <input type="text" id="negocio_id" placeholder="Ej: tacos-guero">

    <button onclick="crearNegocio()">Crear negocio</button>

    <div id="mensaje" class="mensaje"></div>
</div>

<script>
async function crearNegocio() {
    const nombre = document.getElementById("nombre").value.trim();
    const negocio_id = document.getElementById("negocio_id").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.textContent = "";
    mensaje.className = "mensaje";

    if (!nombre || !negocio_id) {
        mensaje.textContent = "Todos los campos son obligatorios";
        mensaje.classList.add("error");
        return;
    }

    const response = await fetch("/madmin/crear-negocio", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, negocio_id })
    });

    const data = await response.json();

    if (response.ok) {
        mensaje.textContent = "Negocio creado correctamente ✅";
        mensaje.classList.add("ok");
        document.getElementById("nombre").value = "";
        document.getElementById("negocio_id").value = "";
    } else {
        mensaje.textContent = data.detail || "Error al crear negocio";
        mensaje.classList.add("error");
    }
}

async function logout() {
    await fetch("/logout", { method: "POST" });
    window.location.href = "/";
}
</script>

</body>
</html>
