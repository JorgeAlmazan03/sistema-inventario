<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 1rem;
        }

        .card {
            background: white;
            padding: 1.8rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1f2937;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.4rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .mensaje {
            margin-top: 1rem;
            text-align: center;
            font-weight: bold;
        }

        .error {
            color: #dc2626;
        }

        .footer {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.3rem;
            }
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="card">
        <h1>Iniciar sesión</h1>

        <label for="negocio">ID del negocio</label>
        <input type="text" id="negocio" placeholder="Ej: taqueria_centro">

        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ej: admin">

        <label for="password">Contraseña</label>
        <input type="password" id="password">

        <button onclick="login()">Entrar</button>

        <div id="mensaje" class="mensaje"></div>

        <div class="footer">
            Sistema de inventarios
        </div>
    </div>
</div>

<script>
async function login() {
    const negocio = document.getElementById("negocio").value.trim();
    const usuario = document.getElementById("usuario").value.trim();
    const password = document.getElementById("password").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.textContent = '';
    mensaje.className = 'mensaje';

    if (!negocio || !usuario || !password) {
        mensaje.textContent = 'Todos los campos son obligatorios';
        mensaje.classList.add('error');
        return;
    }

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                negocio_id: negocio,
                usuario: usuario,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.detail || 'Credenciales incorrectas');
        }

        /*
            Se espera que el backend responda algo como:
            {
              "rol": "admin" | "empleado",
              "negocio_id": "taqueria_centro"
            }
        */

        if (data.rol === 'admin') {
            window.location.href = '/inventario';
        } else if (data.rol === 'empleado') {
            window.location.href = '/inventario/nuevo';
        } else if (data.rol === 'masteradmin') {
            window.location.href = '/maestro';
        } else {
            throw new Error('Rol no reconocido');
        }

    } catch (err) {
        mensaje.textContent = err.message;
        mensaje.classList.add('error');
    }
}
</script>

</body>
</html>
