<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Categoría</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
            margin: 0;
        }

        .form-card {
            max-width: 420px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #34495e;
        }

        .back-btn {
            background: #7f8c8d;
        }

        .back-btn:hover {
            background: #95a5a6;
        }

        @media (max-width: 480px) {
            .form-card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="form-card">
    <h2>Crear categoría</h2>

    <form id="subcoleccionForm">
        <label>Nombre de la categoría</label>
        <input type="text" name="subcoleccion" placeholder="Ej: congelados" required>

        <button type="submit">Crear categoría</button>

        <button type="button" class="back-btn"
                onclick="window.location.href='/inventario'">
            ← Regresar al inventario
        </button>
    </form>
</div>

<script>
const form = document.getElementById("subcoleccionForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const subcoleccion = form.subcoleccion.value.trim().toLowerCase();

    if (!subcoleccion) {
        alert("El nombre no puede estar vacío");
        return;
    }

    const response = await fetch("/inventario_base/crear-subcoleccion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ subcoleccion })
    });

    const data = await response.json();

    if (response.ok) {
        alert("Categoría creada correctamente");
        form.reset();
    } else {
        alert(data.detail || "Error al crear la categoría");
    }
});
</script>

</body>
</html>
