<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 15px;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: white;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* ===== DESKTOP ===== */
        .row {
            display: grid;
            grid-template-columns: 2fr 90px 70px 60px 90px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .cantidad-input {
            width: 100%;
        }

        button {
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 30px auto 0;
        }

        button:hover {
            background: #34495e;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 700px) {

            .row {
                grid-template-columns: 1fr;
                padding: 10px 0;
                border-bottom: 1px solid #eee;
            }

            .row strong {
                font-size: 17px;
            }

            .row span {
                font-size: 15px;
            }

            .row label {
                margin-top: 8px;
            }
        }
    </style>
</head>

<body>
<h1>Crear nuevo inventario</h1>

<label>Fecha</label>
<input id="fecha" type="text" readonly>

<br><br>

<label>Elaborado por: {{nombre}}</label>
<br><br>

<label>Sucursal</label>
<select id="sucursal" required>
    <option value="">Cargando sucursales...</option>
</select>

<br><br>

<label>Notas</label>
<input id="notas" type="text" placeholder="Nota">

<br><br>

{% for subcoleccion, productos in inventario.items() %}
<div class="card">
    <h3>{{ subcoleccion|capitalize }}</h3>

    {% for prod in productos %}
    <div class="row">
        <strong>{{ prod.id }}</strong>

        <input
            type="number"
            step="0.1"
            value="0"
            class="cantidad-input"
            data-sub="{{ subcoleccion }}"
            data-prod="{{ prod.id }}"
        >

        <span>{{ prod.unidad }}</span>


    </div>
    {% endfor %}
</div>
{% endfor %}

<button type="button" onclick="guardarInventario()">
    Guardar inventario
</button>
<button onclick="logout()" style="background:#c0392b">
    Cerrar sesión
</button>
<script>
const USER_ROL = "{{ rol }}";
const NOMBRE_USUARIO = "{{ nombre }}";

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("fecha").value = fechaHoy();
    cargarSucursales();
});

function fechaHoy() {
    const hoy = new Date();
    const dia = String(hoy.getDate()).padStart(2, '0');
    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
    const anio = hoy.getFullYear();
    return `${dia}/${mes}/${anio}`;
}

async function guardarInventario() {
    console.log('Click detectado');

    const fecha = document.getElementById("fecha").value.trim();
    const sucursal = document.getElementById("sucursal").value;
    const notas = document.getElementById("notas").value.trim();

    const inventario = {};

    document.querySelectorAll("input[data-sub]").forEach(input => {
        const sub = input.dataset.sub;
        const prod = input.dataset.prod;
        const existencia = parseFloat(input.value) || 0;

        const row = input.closest(".row");
        const unidad = row.querySelector("span")?.innerText || "";

        if (!inventario[sub]) inventario[sub] = {};

        inventario[sub][prod] = {
            producto: prod,
            existencia,
            unidad,
            urge: false
        };
    });

    const payload = {
        fecha,
        sucursal,
        notas,
        inventario
    };

    console.log("JSON ENVIADO:", payload);

    const response = await fetch("/inventario/crear-inventario", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (response.ok) {
        alert("Inventario creado correctamente");

        if (USER_ROL === "empleado") {
            await fetch("/logout", { method: "POST" });
            window.location.href = "/";
            return;
        }

        window.location.href = "/inventario";
    } else {
        alert(data.detail || "Error al crear inventario");
    }
}

async function cargarSucursales() {
    try {
        const response = await fetch("/inventario_base/obtener-sucursales");
        if (!response.ok) {
            window.location.href = "/";
            return;
        }

        const sucursales = await response.json();
        const select = document.getElementById("sucursal");
        select.innerHTML = "";

        sucursales.forEach(suc => {
            const option = document.createElement("option");
            option.value = suc;
            option.textContent = suc.charAt(0).toUpperCase() + suc.slice(1);
            select.appendChild(option);
        });

    } catch (e) {
        console.error(e);
        window.location.href = "/";
    }
}

async function logout() {
    await fetch('/logout', { method: 'POST' });
    window.location.href = '/';
}
</script>


</body>
</html>
